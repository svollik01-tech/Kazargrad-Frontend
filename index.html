<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3F5A3A" />

    <!-- SEO: these defaults are overridden at runtime by SiteSettings (see src/components/Seo.tsx) -->
    <title>Казарьград — гостевые дома для отдыха рядом с Рязанью</title>
    <meta
      name="description"
      content="Гостевой комплекс Казарьград в Рязанской области: 8 домов для компаний до 12 и 16 гостей, беседки, мангальные зоны, детская анимация, пенные вечеринки и отдых на природе."
    />

    <!-- Open Graph placeholders — replace og:image with a real hosted image for production -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Казарьград — гостевые дома для отдыха рядом с Рязанью" />
    <meta
      property="og:description"
      content="8 домов для компаний до 12 и 16 гостей, приватные участки, беседки, мангальные зоны, детская анимация и развлечения для всей семьи."
    />
    <meta property="og:image" content="/og-placeholder.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Google Fonts: Cormorant Garamond (headings) + Manrope (body), both with Cyrillic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
