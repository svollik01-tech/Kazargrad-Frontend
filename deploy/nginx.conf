# ============================================================================
#  Nginx — раздача статической сборки сайта «Казарьград» (папка dist/)
#
#  Это SPA на React (клиентский роутинг через BrowserRouter), поэтому ключевой
#  момент — fallback `try_files ... /index.html`, иначе прямые ссылки и обновление
#  страницы на /admin будут отдавать 404.
#
#  Скопируйте этот блок в конфиг Nginx (см. README ниже) и поменяйте:
#    - server_name  — на ваш домен или IP
#    - root         — на путь, куда вы положили содержимое dist/
# ============================================================================
events {
    worker_connections 1024;
}

http {
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8002;
        listen [::]:8002;

    #     server_name example.com www.example.com;   # ← ваш домен (или _ для любого)
        server_name localhost;   # ← ваш домен (или _ для любого)

        root /var/www/kazargrad;                    # ← сюда кладётся содержимое dist/
        index index.html;

        # Сжатие (ускоряет загрузку JS/CSS).
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;

        # Хешированные ассеты (assets/index-*.js, *.css) можно кэшировать «навсегда»:
        # при каждой пересборке имена меняются, поэтому старый кэш не мешает.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API: проксируем на бэкенд-контейнер (имя сервиса `api` из docker-compose).
        # client_max_body_size поднят, чтобы проходила загрузка картинок.
        location /api/ {
            proxy_pass http://api:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 30m;
        }

        # Загруженные картинки лежат в общем volume ./uploads и раздаются напрямую
        # (быстрее, чем через бэкенд). Бэкенд пишет сюда же.
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # index.html не кэшируем, чтобы пользователь всегда получал свежую версию,
        # ссылающуюся на актуальные ассеты.
        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        # SPA-fallback: любой неизвестный путь отдаём в index.html,
        # дальше маршрут разруливает React Router (/, /admin, /admin/login, …).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}

