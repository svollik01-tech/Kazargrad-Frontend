services:
  # Бэкенд: хранит контент (data/content.json) и принимает загрузку картинок.
  api:
    build: ./server
    container_name: kazargrad-api
    environment:
      - PORT=3001
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/uploads
      - ADMIN_LOGIN=admin
      - ADMIN_PASSWORD=admin123
      # ВАЖНО: смените секрет на длинную случайную строку перед продакшеном!
      # Любой, кто знает секрет, может подделать токен авторизации.
      - AUTH_SECRET=CHANGE_ME_to_a_long_random_string
    volumes:
      - ./data:/app/data        # JSON-контент переживает пересоздание контейнера
      - ./uploads:/app/uploads  # загруженные картинки (та же папка, что у nginx)
    restart: unless-stopped

  # Nginx: раздаёт собранный фронтенд (dist/) и картинки (/uploads/),
  # а запросы /api/* проксирует на бэкенд.
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8002:8002"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/var/www/kazargrad:ro
      - ./uploads:/var/www/uploads:ro   # та же папка, куда пишет бэкенд
    depends_on:
      - api
    restart: unless-stopped
