services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./uploads:/var/www/uploads
    depends_on:
      - api

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: admin123
      AUTH_SECRET: change-me-in-production
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
